name: ✈️ Flight Scanner

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 17 * * *"
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      session:
        description: "morning / evening / focus"
        default: "morning"
      focus_query:
        description: "Destination for focused scan"
        default: ""

jobs:
  daily-scan:
    name: Daily Flight Scan & Email
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       (contains(github.event.schedule, '0 4') || contains(github.event.schedule, '0 17')))

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: ⏰ Determine session
        run: |
          HOUR=$(TZ="Asia/Jerusalem" date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SESSION="${{ github.event.inputs.session }}"
            FOCUS="${{ github.event.inputs.focus_query }}"
          elif [ "$HOUR" -lt 12 ]; then
            SESSION="morning"; FOCUS=""
          else
            SESSION="evening"; FOCUS=""
          fi
          echo "SESSION=$SESSION" >> $GITHUB_ENV
          echo "FOCUS_QUERY=$FOCUS" >> $GITHUB_ENV

      - name: ✈️ Run Scanner
        env:
          EMAIL_SESSION:    ${{ env.SESSION }}
          FOCUS_QUERY:      ${{ env.FOCUS_QUERY }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST:        smtp.gmail.com
          SMTP_PORT:        "587"
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          TEST_MODE:        ${{ secrets.TEST_MODE }}
          KIWI_API_KEY:     ${{ secrets.KIWI_API_KEY }}
          SERPAPI_KEY:      ${{ secrets.SERPAPI_KEY }}
          AVIASALES_TOKEN:  ${{ secrets.AVIASALES_TOKEN }}
        run: cd src && python main.py

  focus-listener:
    name: Check for FOCUS reply emails
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: |
      github.event_name == 'schedule' &&
      !contains(github.event.schedule, '0 4') &&
      !contains(github.event.schedule, '0 17')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: 📬 Check Gmail for FOCUS requests
        env:
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:         ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST:             smtp.gmail.com
          SMTP_PORT:             "587"
          RECIPIENT_EMAILS:      ${{ secrets.RECIPIENT_EMAILS }}
          ALLOWED_FOCUS_SENDERS: ${{ secrets.ALLOWED_FOCUS_SENDERS }}
          KIWI_API_KEY:          ${{ secrets.KIWI_API_KEY }}
          SERPAPI_KEY:           ${{ secrets.SERPAPI_KEY }}
          AVIASALES_TOKEN:       ${{ secrets.AVIASALES_TOKEN }}
        run: cd src && python gmail_listener.py
