name: "✈️ Flight Scanner"

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  scan-and-send:
    name: Scan and Send
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EMAIL_SESSION:    morning
      SMTP_USER:        ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
      SMTP_HOST:        smtp.gmail.com
      SMTP_PORT:        "587"
      RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
      SERPAPI_KEY:      ${{ secrets.SERPAPI_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Check SerpAPI quota and test one flight
        run: |
          python3 << 'SCRIPT'
          import requests, os, json

          key = os.environ.get("SERPAPI_KEY","")
          print(f"SERPAPI_KEY set: {bool(key)} ({len(key)} chars)")

          # Check account
          r = requests.get("https://serpapi.com/account", params={"api_key": key}, timeout=10)
          print(f"Account status: {r.status_code}")
          try:
              d = r.json()
              print(f"Plan: {d.get('plan_name','?')}")
              print(f"Searches this month: {d.get('this_month_usage','?')}")
              print(f"Searches remaining: {d.get('searches_left','?')}")
          except:
              print(r.text[:200])

          # Test one real search
          print()
          print("--- Test: TLV->ATH 2026-07-05 ---")
          r2 = requests.get("https://serpapi.com/search", params={
              "engine": "google_flights",
              "departure_id": "TLV", "arrival_id": "ATH",
              "outbound_date": "2026-07-05",
              "travel_class": 1, "stops": 2,
              "currency": "ILS", "hl": "iw",
              "api_key": key,
          }, timeout=20)
          print(f"Search status: {r2.status_code}")
          try:
              d2 = r2.json()
              if "error" in d2:
                  print(f"ERROR: {d2['error']}")
              else:
                  flights = d2.get("best_flights", []) + d2.get("other_flights", [])
                  print(f"Flights found: {len(flights)}")
                  for f in flights[:3]:
                      price = f.get("price",0)
                      legs  = f.get("flights",[])
                      stops = len(legs)-1
                      dep   = legs[0].get("departure_airport",{}).get("time","?") if legs else "?"
                      print(f"  ₪{price} | stops={stops} | dep={dep} | airline={legs[0].get('airline','?') if legs else '?'}")
          except Exception as e:
              print(f"Parse error: {e}")
              print(r2.text[:300])
          SCRIPT

      - name: Run Scanner
        run: cd src && python -u main.py
