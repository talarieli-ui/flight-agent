name: "✈️ Flight Scanner"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  scan-and-send:
    name: Scan and Send
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      EMAIL_SESSION:    morning
      SMTP_USER:        ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
      SMTP_HOST:        smtp.gmail.com
      SMTP_PORT:        "587"
      RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
      SERPAPI_KEY:      ${{ secrets.SERPAPI_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Run Scanner
        run: cd src && python -u main.py

      - name: Commit cache
        if: always()
        run: |
          git config user.email "flight-bot@github.com"
          git config user.name "Flight Bot"
          git add cache/ || true
          git diff --quiet --cached || git commit -m "cache: prices update"
          git push || true
