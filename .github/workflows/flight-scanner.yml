name: ✈️ Flight Scanner

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  scan-and-send:
    name: Scan and Send
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EMAIL_SESSION:    morning
      SMTP_USER:        ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
      SMTP_HOST:        smtp.gmail.com
      SMTP_PORT:        "587"
      RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
      SERPAPI_KEY:      ${{ secrets.SERPAPI_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: 🔍 Debug API connectivity
        run: |
          python3 -c "
import requests, json

print('=== Aviasales prices_for_dates ===')
try:
    r = requests.get('https://api.travelpayouts.com/aviasales/v3/prices_for_dates',
        params={'origin':'TLV','destination':'KGS','departure_at':'2026-07-10',
                'direct':'true','limit':3,'currency':'usd','market':'il'}, timeout=12)
    print(f'Status: {r.status_code}')
    d = r.json()
    print(f'Data count: {len(d.get("data",[]))}')
    print(json.dumps(d.get("data",[])[:1], indent=2)[:300])
except Exception as e:
    print(f'Error: {e}')

print()
print('=== Travelpayouts special offers ===')
try:
    r2 = requests.get('https://api.travelpayouts.com/aviasales/v3/get_special_offers',
        params={'origin':'TLV','direct':'true','currency':'usd','limit':5,'market':'il'}, timeout=12)
    print(f'Status: {r2.status_code}')
    d2 = r2.json()
    print(f'Data count: {len(d2.get("data",[]))}')
    print(json.dumps(d2.get("data",[])[:1], indent=2)[:300])
except Exception as e:
    print(f'Error: {e}')

print()
print('=== Aviasales cheap prices (v1) ===')
try:
    r3 = requests.get('https://api.travelpayouts.com/v1/prices/cheap',
        params={'origin':'TLV','destination':'KGS','depart_date':'2026-07',
                'currency':'usd','page':1}, timeout=12)
    print(f'Status: {r3.status_code}')
    d3 = r3.json()
    print(str(d3)[:300])
except Exception as e:
    print(f'Error: {e}')
"

      - name: ✈️ Run Scanner
        run: cd src && python -u main.py
