name: "✈️ Flight Scanner"

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  scan-and-send:
    name: Scan and Send
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EMAIL_SESSION:    morning
      SMTP_USER:        ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
      SMTP_HOST:        smtp.gmail.com
      SMTP_PORT:        "587"
      RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
      SERPAPI_KEY:      ${{ secrets.SERPAPI_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Diagnose SerpAPI
        run: cd src && python -u diag.py 2>&1 | tee /tmp/diag.txt || true

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diag-${{ github.run_number }}
          path: /tmp/diag.txt
          retention-days: 1

      - name: Run Scanner
        run: cd src && python -u main.py
