name: "✈️ Flight Scanner"

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  scan-and-send:
    name: Scan and Send
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EMAIL_SESSION:    morning
      SMTP_USER:        ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
      SMTP_HOST:        smtp.gmail.com
      SMTP_PORT:        "587"
      RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
      SERPAPI_KEY:      ${{ secrets.SERPAPI_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Diagnose and save results
        run: |
          python3 << 'SCRIPT'
import requests, os, json

key = os.environ.get("SERPAPI_KEY","")
out = []
out.append(f"SERPAPI_KEY length: {len(key)}")

# Check account
try:
    r = requests.get("https://serpapi.com/account",
        params={"api_key": key}, timeout=10)
    d = r.json()
    out.append(f"Account HTTP: {r.status_code}")
    out.append(f"Plan: {d.get('plan_name','?')}")
    out.append(f"Searches this month: {d.get('this_month_usage','?')}")
    out.append(f"Searches left: {d.get('searches_left','?')}")
    if "error" in d:
        out.append(f"Account error: {d['error']}")
except Exception as e:
    out.append(f"Account check failed: {e}")

# Test one search
try:
    r2 = requests.get("https://serpapi.com/search", params={
        "engine": "google_flights",
        "departure_id": "TLV", "arrival_id": "ATH",
        "outbound_date": "2026-07-10",
        "travel_class": 1, "stops": 2,
        "currency": "ILS", "hl": "iw",
        "api_key": key,
    }, timeout=20)
    d2 = r2.json()
    out.append(f"Search HTTP: {r2.status_code}")
    if "error" in d2:
        out.append(f"Search error: {d2['error']}")
    else:
        flights = d2.get("best_flights",[]) + d2.get("other_flights",[])
        out.append(f"Flights found: {len(flights)}")
        for f in flights[:5]:
            price = f.get("price",0)
            legs  = f.get("flights",[])
            dep   = legs[0].get("departure_airport",{}).get("time","?") if legs else "?"
            airline = legs[0].get("airline","?") if legs else "?"
            out.append(f"  price=ILS{price} stops={len(legs)-1} dep={dep} airline={airline}")
except Exception as e:
    out.append(f"Search failed: {e}")

result = "\n".join(out)
print(result)
with open("diag_output.txt","w") as f:
    f.write(result)
'SCRIPT'

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diag-${{ github.run_number }}
          path: diag_output.txt
          retention-days: 1

      - name: Run Scanner
        run: cd src && python -u main.py
