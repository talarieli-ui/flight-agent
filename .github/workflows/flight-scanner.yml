name: ✈️ Flight Scanner

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      session:
        description: "morning / evening / focus"
        default: "morning"

jobs:
  daily-scan:
    name: Daily Flight Scan & Email
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: ✈️ Run Scanner
        env:
          EMAIL_SESSION:    morning
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST:        smtp.gmail.com
          SMTP_PORT:        "587"
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          TEST_MODE:        "true"
        run: |
          cd src
          python main.py 2>&1
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          exit $EXIT_CODE
